<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gushwork | Mangalam HDPE Pipes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sticky Navigation section -->
    <header class="topbar">
        <div class="container">
            <a href="#" class="logo">
                <img src="/public/headerlogo.png" alt="Logo of resource">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="#about" class="nav-link">About Us</a></li>
                    <li class="dropdown">
                        <a href="#products" class="nav-link dropbtn">
                            Products <i class="fas fa-chevron-down"></i>
                        </a>
                        <ul class="dropdown-content">
                            <li><a href="#" data-product="hdpe-pipes">HDPE Pipes</a></li>
                            <li><a href="#" data-product="sprinkler-pipes">Sprinkler Pipes</a></li>
                            <li><a href="#" data-product="plb-ducts">PLB Ducts</a></li>
                            <li><a href="#" data-product="column-pipes">Column Pipes</a></li>
                        </ul>
                    </li>
                    <li><a href="#contact" class="btn btn-primary">Contact Us</a></li>
                </ul>
            </nav>
            <button class="mobile-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main>

         <!-- Product Navigation section of the product -->
        <nav class="productnavigation-container">
            <div class="container">
                <ul class="breadcrumbs">
                    <li><a href="#">Products</a></li>
                    <li><span class="active" id="current-breadcrumb">HDPE Pipes</span></li>
                </ul>
            </div>
        </nav>


        <!-- Product carousel with all relevent details -->

        <section class="product-view">
             <div class="container product-view__grid">
                <!-- Carousel with zoom functionality -->
                <div class="product-gallery">
                    <div class="main-image-container" id="zoom-container">
                        <img src="/public/product_pipe.png" alt="Product Image" id="main-product-image">
                        <div class="zoom-lens" id="zoom-lens"></div>
                        <div class="zoom-result" id="zoom-result"></div>
                        <button class="gallery-nav prev" aria-label="Previous image"><i class="fas fa-chevron-left"></i></button>
                        <button class="gallery-nav next" aria-label="Next image"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="thumbnail-carousel">
                        <div class="thumb active"><img src="/public/product_pipe.png" alt="Thumb 1"></div>
                        <div class="thumb"><img src="/public/product_pipe.png" alt="Thumb 2"></div>
                        <div class="thumb"><img src="/public/product_pipe.png" alt="Thumb 3"></div>
                        <div class="thumb"><img src="/public/product_pipe.png" alt="Thumb 4"></div>
                        <div class="thumb"><img src="/public/product_pipe.png" alt="Thumb 5"></div>
                        <div class="thumb"><img src="/public/product_pipe.png" alt="Thumb 6"></div>
                    </div>
                </div>
        </section>

    </main>
 
    <script src="script.js"></script> 
</body>
</html>
